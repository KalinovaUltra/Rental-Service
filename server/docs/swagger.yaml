openapi: 3.0.0

info:
  title: Housing Rental API
  version: 1.0.0
  description: API для работы с предложениями, отзывами и пользователями

servers:
  - url: http://localhost:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string }
        userType: { type: string, enum: ['normal', 'pro'] }
        avatar: { type: string }
    
    Offer:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        publishDate: { type: string, format: date-time }
        city: { type: string, enum: ['Paris', 'Cologne', 'Brussels', 'Amsterdam', 'Hamburg', 'Dusseldorf'] }
        previewImage: { type: string }
        photos: { type: array, items: { type: string } }
        isPremium: { type: boolean }
        isFavorite: { type: boolean }
        rating: { type: number }
        type: { type: string, enum: ['apartment', 'house', 'room', 'hotel'] }
        rooms: { type: integer }
        guests: { type: integer }
        price: { type: integer }
        features: { type: array, items: { type: string } }
        commentsCount: { type: integer }
        latitude: { type: number }
        longitude: { type: number }
        authorId: { type: integer }
    
    Review:
      type: object
      properties:
        id: { type: integer }
        text: { type: string }
        publishDate: { type: string, format: date-time }
        rating: { type: integer, minimum: 1, maximum: 5 }
        authorId: { type: integer }
        OfferId: { type: integer }

tags:
  - name: Users
  - name: Offers
  - name: Reviews

paths:
  # ==================== USERS ====================
  /register:
    post:
      summary: Регистрация нового пользователя
      tags: [Users]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - username
                - email
                - password
                - userType
              properties:
                username: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
                userType: { type: string, enum: ['normal', 'pro'] }
                avatar: { type: string, format: binary }
      responses:
        "200":
          description: Успешная регистрация
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

  /login:
    post:
      summary: Авторизация пользователя
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
            example:
              email: "user@example.com"
              password: "password123"
      responses:
        "200":
          description: Успешный логин, возвращает токен
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user:
                    $ref: '#/components/schemas/User'
    
    get:
      summary: Проверка авторизации (получение данных текущего пользователя)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Данные пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "401":
          description: Не авторизован

  /logout:
    delete:
      summary: Выход из системы
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Успешный выход

  # ==================== OFFERS ====================
  /offers:
    get:
      summary: Получение всех предложений (краткая версия)
      tags: [Offers]
      responses:
        "200":
          description: Список предложений
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    title: { type: string }
                    type: { type: string }
                    price: { type: integer }
                    city: { type: object }
                    location: { type: object }
                    isFavorite: { type: boolean }
                    isPremium: { type: boolean }
                    rating: { type: number }
                    previewImage: { type: string }

    post:
      summary: Создание нового предложения
      description: Создает новое предложение. Поле previewImage обязательно. Поле photos — массив из 6 файлов.
      tags: [Offers]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - description
                - city
                - price
                - rooms
                - guests
                - previewImage
              properties:
                title: { type: string }
                description: { type: string }
                publishDate: { type: string, format: date }
                city: { type: string, enum: ['Paris', 'Cologne', 'Brussels', 'Amsterdam', 'Hamburg', 'Dusseldorf'] }
                isPremium: { type: boolean }
                isFavorite: { type: boolean }
                rating: { type: number }
                type: { type: string, enum: ['apartment', 'house', 'room', 'hotel'] }
                rooms: { type: integer }
                guests: { type: integer }
                price: { type: number }
                features: { type: string, description: 'JSON-строка массива значений' }
                commentsCount: { type: integer }
                latitude: { type: number }
                longitude: { type: number }
                userId: { type: integer }
                previewImage: { type: string, format: binary, description: 'Основное изображение' }
                photos: { type: array, items: { type: string, format: binary }, description: 'Дополнительные изображения' }
      responses:
        "201":
          description: Предложение успешно создано
        "400":
          description: Ошибка валидации данных
        "401":
          description: Не авторизован

  /offers/{id}:
    get:
      summary: Получение полной информации о предложении
      tags: [Offers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: ID предложения
      responses:
        "200":
          description: Полная информация о предложении
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  title: { type: string }
                  description: { type: string }
                  type: { type: string }
                  price: { type: integer }
                  city: { type: object }
                  location: { type: object }
                  isFavorite: { type: boolean }
                  isPremium: { type: boolean }
                  rating: { type: number }
                  previewImage: { type: string }
                  photos: { type: array, items: { type: string } }
                  bedrooms: { type: integer }
                  maxAdults: { type: integer }
                  goods: { type: array, items: { type: string } }
                  host: { type: object }
                  commentsCount: { type: integer }
        "404":
          description: Предложение не найдено

  /offers/{id}/nearby:
    get:
      summary: Получение ближайших предложений
      tags: [Offers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
          description: ID текущего предложения
      responses:
        "200":
          description: Список ближайших предложений (до 3)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    title: { type: string }
                    type: { type: string }
                    price: { type: integer }
                    previewImage: { type: string }
                    isPremium: { type: boolean }
                    isFavorite: { type: boolean }
                    rating: { type: number }

  /favorite:
    get:
      summary: Получение избранных предложений
      tags: [Offers]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Список избранных предложений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'
        "401":
          description: Не авторизован

  /favorite/{offerId}/{status}:
    post:
      summary: Добавление/удаление из избранного
      tags: [Offers]
      security:
        - bearerAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema: { type: integer }
          description: ID предложения
        - name: status
          in: path
          required: true
          schema: { type: integer, enum: [0, 1] }
          description: "1 - добавить в избранное, 0 - удалить"
      responses:
        "200":
          description: Статус избранного обновлен
        "401":
          description: Не авторизован
        "404":
          description: Предложение не найдено

  # ==================== REVIEWS ====================
  /comments/{offerId}:
    get:
      summary: Получение отзывов для предложения
      tags: [Reviews]
      parameters:
        - name: offerId
          in: path
          required: true
          schema: { type: integer }
          description: ID предложения
      responses:
        "200":
          description: Список отзывов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
    
    post:
      summary: Добавление нового отзыва
      tags: [Reviews]
      security:
        - bearerAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema: { type: integer }
          description: ID предложения
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
                - rating
              properties:
                text: { type: string }
                rating: { type: integer, minimum: 1, maximum: 5 }
      responses:
        "201":
          description: Отзыв успешно добавлен
        "400":
          description: Ошибка валидации
        "401":
          description: Не авторизован
        "404":
          description: Предложение не найдено